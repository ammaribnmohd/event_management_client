<section class="form-shell">
  <h1>{{ isEdit ? 'Edit Event' : 'Create New Event' }}</h1>

  <p *ngIf="loading">Loading event...</p>
  <p class="error" *ngIf="error">{{ error }}</p>
  <p class="success" *ngIf="success">{{ success }}</p>

  <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!loading">
    <label>
      Title
      <input formControlName="title" />
    </label>

    <label>
      Description
      <textarea formControlName="description" rows="4"></textarea>
    </label>

    <label>
      Date
      <div class="date-field">
        <input
          matInput
          [matDatepicker]="eventDatePicker"
          formControlName="eventDate"
          [min]="isEdit ? null : minSelectableDate"
          placeholder="Select date"
        />
        <mat-datepicker-toggle [for]="eventDatePicker"></mat-datepicker-toggle>
        <mat-datepicker #eventDatePicker></mat-datepicker>
      </div>
      <small class="error" *ngIf="form.controls.eventDate.touched && form.controls.eventDate.hasError('pastDate')">
        Please choose today or a future date.
      </small>
    </label>

    <label>
      Time
      <input type="time" formControlName="eventTime" />
    </label>

    <label>
      Location
      <input formControlName="location" />
    </label>

    <label>
      Maximum Capacity
      <input type="number" formControlName="maxCapacity" min="1" />
    </label>

    <div class="actions">
      <button type="submit">{{ isEdit ? 'Update Event' : 'Create Event' }}</button>
      <a routerLink="/admin/dashboard" class="ghost">Cancel</a>
    </div>
  </form>
</section>
